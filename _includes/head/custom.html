<style>
/* ===== Portfolio Custom Styles ===== */
:root {
  --pa: #4b5563;
  --pa-light: #f9fafb;
  --pa-border: #e5e7eb;
}

/* Smooth scroll */
html { scroll-behavior: smooth; }

/* ── Cert / Timeline ── */
.port-tl-wrap { margin: 0.5em 0 2em; }
.port-tl-section {
  font-size: 0.7em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--pa);
  margin: 1.4em 0 0.6em 28px;
}
.port-timeline {
  position: relative;
  padding-left: 28px;
  margin-bottom: 0.4em;
}
.port-timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 8px;
  bottom: 4px;
  width: 2px;
  background: linear-gradient(to bottom, var(--pa) 0%, var(--pa-border) 100%);
}
.port-tl-item {
  position: relative;
  margin-bottom: 1.8em;
}
.port-tl-item:last-child { margin-bottom: 0.4em; }
.port-tl-item::before {
  content: '';
  position: absolute;
  left: -22px;
  top: 5px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--pa);
  box-shadow: 0 0 0 3px var(--pa-light);
}
.port-tl-date  { font-size: 0.74em; color: #aaa; font-weight: 600; margin-bottom: 3px; }
.port-tl-title { font-size: 0.91em; font-weight: 800; color: #222; margin-bottom: 3px; }
.port-tl-sub   { font-size: 0.8em; color: var(--pa); font-weight: 600; }

/* ── Cert / Language 2-column ── */
.port-cert-lang-wrap {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.port-cert-col { flex: 1 1 180px; }

/* ── Skill Tabs ── */
.port-tabs { margin: 0.8em 0 2em; }
.port-tab-nav {
  display: flex;
  flex-wrap: nowrap;
  border-bottom: 2px solid var(--pa-border);
  margin-bottom: 1.2em;
  gap: 0;
}
.port-tab-btn {
  flex: 1;
  text-align: center;
  padding: 8px 6px;
  font-size: 0.77em;
  font-weight: 700;
  cursor: pointer;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: #aaa;
  border-radius: 4px 4px 0 0;
  transition: color 0.18s, border-color 0.18s, background 0.18s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.port-tab-btn:hover { color: var(--pa); background: var(--pa-light); }
.port-tab-btn.active {
  color: var(--pa);
  border-bottom-color: var(--pa);
  background: var(--pa-light);
}
.port-tab-panel { display: none; }
.port-tab-panel.active {
  display: block;
  animation: portTabIn 0.22s ease;
}
@keyframes portTabIn {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Skill Items (inside tabs) ── */
.port-skill-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 8px;
}
.port-skill-item {
  border: 1px solid var(--pa-border);
  border-left: 3px solid var(--pa);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  background: #fff;
}
.port-skill-item .si-name { font-size: 0.86em; font-weight: 700; color: #222; }
.port-skill-item .si-desc { font-size: 0.78em; color: #666; margin-top: 3px; line-height: 1.5; }

/* ── Project Cards ── */
.port-proj-cards { display: flex; flex-wrap: wrap; gap: 16px; margin: 1em 0; }
.port-proj-card {
  flex: 1 1 270px;
  border: 1.5px solid var(--pa-border);
  border-radius: 12px;
  padding: 22px 24px;
  background: #fff;
  transition: box-shadow 0.2s, border-color 0.2s;
  text-decoration: none !important;
  color: inherit !important;
  display: block;
}
.port-proj-card:hover { box-shadow: 0 6px 20px rgba(107,79,170,0.13); border-color: var(--pa); }
.port-proj-card .ppc-type   { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--pa); margin-bottom: 5px; }
.port-proj-card .ppc-title  { font-size: 1.05em; font-weight: 800; margin-bottom: 4px; color: #111; }
.port-proj-card .ppc-period { font-size: 0.77em; color: #aaa; margin-bottom: 10px; }
.port-proj-card .ppc-desc   { font-size: 0.83em; color: #555; line-height: 1.58; margin-bottom: 14px; }
.port-proj-card .ppc-tags   { display: flex; flex-wrap: wrap; gap: 5px; }
.port-proj-card .ppc-tag    { font-size: 0.7em; background: var(--pa-light); color: var(--pa); padding: 2px 9px; border-radius: 999px; font-weight: 600; }

/* ── Contact ── */
.port-contact-wrap { display: flex; flex-wrap: wrap; gap: 12px; margin: 1em 0; }
.port-contact-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--pa-light);
  border: 1px solid var(--pa-border);
  border-radius: 8px;
  padding: 12px 20px;
  text-decoration: none !important;
  color: #333 !important;
  font-size: 0.87em;
  font-weight: 600;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.port-contact-item:hover { border-color: var(--pa); box-shadow: 0 2px 8px rgba(107,79,170,0.12); }
.port-contact-icon { font-size: 1.05em; }

/* ── Post: Meta bar ── */
.port-meta-bar {
  display: flex;
  flex-wrap: wrap;
  border: 1px solid var(--pa-border);
  border-radius: 10px;
  overflow: hidden;
  margin: 0.5em 0 2em;
}
.port-meta-item {
  flex: 1 1 140px;
  padding: 14px 18px;
  background: var(--pa-light);
  border-right: 1px solid var(--pa-border);
}
.port-meta-item:last-child { border-right: none; }
.port-meta-label { font-size: 0.67em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--pa); margin-bottom: 4px; }
.port-meta-value { font-size: 0.85em; font-weight: 700; color: #333; }

/* ── Post: Tech Badges ── */
.port-tech-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 0.6em 0 1.6em; }
.port-badge { display: inline-block; padding: 3px 11px; border-radius: 999px; font-size: 0.78em; font-weight: 600; }

/* ── Post: Tech Groups ── */
.port-tech-groups { margin: 0.6em 0 1.6em; }
.port-tech-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.ptg-label { font-size: 0.69em; font-weight: 700; color: #888; min-width: 76px; text-align: right; padding-top: 4px; flex-shrink: 0; }
.ptg-badges { display: flex; flex-wrap: wrap; gap: 5px; }
.pb-b { background: #dbeafe; color: #1e40af; }
.pb-g { background: #dcfce7; color: #166534; }
.pb-y { background: #fef9c3; color: #854d0e; }
.pb-p { background: #ede9fe; color: #5b21b6; }
.pb-r { background: #fee2e2; color: #991b1b; }
.pb-o { background: #ffedd5; color: #9a3412; }
.pb-s { background: #f1f5f9; color: #475569; }

/* ── Post: Flow ── */
.port-flow {
  border: 1px solid var(--pa-border);
  border-radius: 10px;
  overflow: hidden;
  margin: 1em 0 1.6em;
}
.port-flow-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--pa-border);
}
.port-flow-item:last-child { border-bottom: none; }
.port-flow-num {
  flex-shrink: 0;
  width: 24px; height: 24px;
  background: var(--pa);
  color: #fff;
  border-radius: 50%;
  font-size: 0.75em;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.port-flow-text { font-size: 0.87em; color: #444; line-height: 1.55; }
.port-flow-text strong { color: #222; }

/* ── Post: Role Tags ── */
.port-role-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 0.6em 0 1.6em; }
.port-role-tag {
  background: #fff;
  border: 1.5px solid var(--pa);
  color: var(--pa);
  font-size: 0.8em;
  font-weight: 700;
  padding: 4px 13px;
  border-radius: 6px;
}

/* ── Post: Decision Box ── */
.port-decision {
  background: var(--pa-light);
  border-left: 4px solid var(--pa);
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
  margin: 1em 0 1.4em;
  font-size: 0.9em;
  line-height: 1.7;
  color: #333;
}
.port-decision p:last-child { margin-bottom: 0; }

/* ── Post: Perf Table ── */
.port-perf-wrap {
  display: block;
  width: fit-content;
  max-width: 100%;
  overflow-x: auto;
  margin: 1em 0;
  clear: both;
}
.port-perf-wrap table {
  width: auto;
  border-collapse: collapse;
  border: 1px solid var(--pa-border);
  border-radius: 8px;
  font-size: 0.88em;
}
.port-perf-wrap thead th {
  background: var(--pa-light);
  padding: 10px 14px;
  border-bottom: 1px solid var(--pa-border);
  font-weight: 700;
  color: #333;
  white-space: nowrap;
}
.port-perf-wrap tbody td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--pa-border);
  color: #444;
}
.port-perf-wrap tbody td:last-child {
  text-align: center;
  white-space: nowrap;
}
.port-perf-wrap tbody tr:last-child td { border-bottom: none; }
.port-perf-wrap tbody tr:hover { background: #fafafa; }
.port-highlight { color: var(--pa); font-weight: 800; }

/* ── Post: Opt Steps ── */
.port-opt-steps { margin: 1em 0 1.4em; }
.port-opt-step { border: 1px solid var(--pa-border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
.port-opt-step-hd { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--pa-light); border-bottom: 1px solid var(--pa-border); }
.port-opt-step-num { background: var(--pa); color: #fff; font-size: 0.72em; font-weight: 700; padding: 2px 10px; border-radius: 999px; flex-shrink: 0; }
.port-opt-step-title { font-size: 0.9em; font-weight: 700; color: #333; }
.port-opt-step-body { padding: 12px 16px; font-size: 0.86em; color: #444; line-height: 1.65; }

/* ── Post: Perf Progression Cards ── */
.port-perf-prog { display: flex; align-items: stretch; gap: 8px; margin: 0.4em 0 1.8em; flex-wrap: wrap; }
.port-perf-prog-item { flex: 1 1 0; min-width: 90px; border: 1px solid var(--pa-border); border-radius: 10px; padding: 14px 16px; background: #fff; text-align: center; }
.port-perf-prog-item.is-final { border-color: var(--pa); background: var(--pa-light); }
.pppi-label { font-size: 0.69em; color: #888; font-weight: 600; margin-bottom: 6px; }
.pppi-mtt { font-size: 1.35em; font-weight: 800; color: #222; }
.is-final .pppi-mtt { color: var(--pa); }
.pppi-tps { font-size: 0.73em; color: #666; margin-top: 2px; }
.pppi-delta { display: inline-block; font-size: 0.71em; font-weight: 700; color: #166534; background: #dcfce7; padding: 2px 9px; border-radius: 999px; margin-top: 8px; }
.pppi-arrow { font-size: 1.1em; color: #ccc; flex-shrink: 0; display: flex; align-items: center; }

/* ── Layout: sidebar ↔ main content spacing ── */
@media (min-width: 1024px) {
  #main > .sidebar {
    width: 200px !important;
  }

  #main > .sidebar > * {
    margin-left: 0;
    margin-right: 0;
  }

  #main > .page {
    width: calc(100% - 200px) !important;
    padding-left: 0.25em !important;
  }
}

@media (min-width: 1280px) {
  #main > .sidebar {
    width: 240px !important;
  }

  #main > .page {
    width: calc(100% - 240px) !important;
    padding-left: 0.5em !important;
  }
}
</style>

<!-- end custom head snippets -->
